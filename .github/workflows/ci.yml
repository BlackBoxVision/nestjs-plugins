name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  detect:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nestjs-audit-log:
              - 'packages/nestjs-audit-log/**'
              - 'tsconfig.base.json'
              - 'jest.preset.ts'
              - '.eslintrc.js'
              - 'package.json'
              - 'turbo.json'
            nestjs-auth:
              - 'packages/nestjs-auth/**'
              - 'tsconfig.base.json'
              - 'jest.preset.ts'
              - '.eslintrc.js'
              - 'package.json'
              - 'turbo.json'
            nestjs-notifications:
              - 'packages/nestjs-notifications/**'
              - 'tsconfig.base.json'
              - 'jest.preset.ts'
              - '.eslintrc.js'
              - 'package.json'
              - 'turbo.json'
            nestjs-pagination:
              - 'packages/nestjs-pagination/**'
              - 'tsconfig.base.json'
              - 'jest.preset.ts'
              - '.eslintrc.js'
              - 'package.json'
              - 'turbo.json'
            nestjs-prisma:
              - 'packages/nestjs-prisma/**'
              - 'tsconfig.base.json'
              - 'jest.preset.ts'
              - '.eslintrc.js'
              - 'package.json'
              - 'turbo.json'
            nestjs-response:
              - 'packages/nestjs-response/**'
              - 'tsconfig.base.json'
              - 'jest.preset.ts'
              - '.eslintrc.js'
              - 'package.json'
              - 'turbo.json'
            nestjs-storage:
              - 'packages/nestjs-storage/**'
              - 'tsconfig.base.json'
              - 'jest.preset.ts'
              - '.eslintrc.js'
              - 'package.json'
              - 'turbo.json'

  ci:
    name: ${{ matrix.package }}
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo run lint --filter=@bbv/${{ matrix.package }}

      - name: Typecheck
        run: npx turbo run typecheck --filter=@bbv/${{ matrix.package }}

      - name: Build
        run: npx turbo run build --filter=@bbv/${{ matrix.package }}

      - name: Test with coverage
        run: npx turbo run test:cov --filter=@bbv/${{ matrix.package }}

      - name: Upload coverage
        if: matrix.node-version == '22.x' && always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.package }}
          fail_ci_if_error: true

  e2e:
    name: Demo API E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bbv
          POSTGRES_PASSWORD: bbv_dev
          POSTGRES_DB: bbv_demo
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U bbv -d bbv_demo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9004:9000
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      smtp:
        image: rnwood/smtp4dev:latest
        ports:
          - 2526:25
    env:
      DATABASE_URL: postgresql://bbv:bbv_dev@localhost:5433/bbv_demo?schema=public
      JWT_SECRET: super-secret-jwt-key-for-ci
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      S3_ENDPOINT: http://localhost:9004
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: demo-uploads
      S3_REGION: us-east-1
      SMTP_HOST: localhost
      SMTP_PORT: 2526
      SMTP_FROM: noreply@demo.local
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npx turbo run build

      - name: Create MinIO bucket
        run: |
          curl -sf http://localhost:9004/minio/health/live || echo "MinIO not ready"
          npm install -g minio-client || true
          docker run --rm --network host minio/mc sh -c \
            'mc alias set local http://localhost:9004 minioadmin minioadmin && mc mb --ignore-existing local/demo-uploads'

      - name: Push Prisma schema
        working-directory: apps/demo
        run: npx prisma db push --force-reset --skip-generate --accept-data-loss

      - name: Generate Prisma client
        working-directory: apps/demo
        run: npx prisma generate

      - name: Run E2E tests
        working-directory: apps/demo
        run: npx jest --config jest.e2e.config.ts --forceExit --detectOpenHandles
