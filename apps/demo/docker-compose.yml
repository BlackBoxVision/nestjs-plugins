services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bbv
      POSTGRES_PASSWORD: bbv_dev
      POSTGRES_DB: bbv_demo
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9004:9000'
      - '9005:9001'
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  smtp:
    image: rnwood/smtp4dev:latest
    ports:
      - '8027:80'
      - '2526:25'

volumes:
  pgdata:
  minio_data:
